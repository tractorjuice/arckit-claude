  - { span: "Cabinet Office · cross-gov GenAI", title: "Cabinet Office GenAI Platform", url: "https://tractorjuice.github.io/arckit-test-project-v9-cabinet-office-genai/", body: "Cross-government GenAI platform shaped around AI Playbook, ATRS, Secure by Design." }
  - { span: "Scottish Courts · justice, devolved gov", title: "Scottish Courts GenAI Strategy", url: "https://tractorjuice.github.io/arckit-test-project-v14-scottish-courts/", body: "AI strategy with devolved-government policy, data and assurance considerations." }
# bootstrap_cadence items: day (intensive label), span (spread-cadence label), title (phase), body
bootstrap_cadence:
  - { day: "Day 0", span: "Kickoff", title: "Embed", body: "Confirm scope, decision horizon, known constraints and stakeholders. Provision access and share internal context." }
  - { day: "Days 1-2", span: "Weeks 1-2", title: "Evidence capture", body: "Review existing material, interview decision makers and map obligations." }
  - { day: "Day 3", span: "Week 3", title: "Synthesis", body: "Draft the principles, requirements, risk and stakeholder artefacts." }
  - { day: "Day 4", span: "Week 4", title: "Challenge", body: "Run a structured review with sponsors, architecture and delivery leads." }
  - { day: "Day 5", span: "Week 5", title: "Readout", body: "Hand over the pack, unresolved decisions and recommended next actions or follow-on scope." }
